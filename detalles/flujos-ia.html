<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujos de Trabajo IA | Diseño Gráfico Express</title>
    <link rel="stylesheet" href="../style.css?v=6">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #05070a; }
        .showcase-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .full-image-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 40px 0;
            border: 1px solid rgba(192, 160, 128, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .full-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .description-box {
            max-width: 800px;
            text-align: center;
            margin-top: 40px;
            background: rgba(20, 25, 40, 0.5);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .back-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="back-nav">
        <a href="../index.html#ia" class="btn-primary" style="background: rgba(11, 15, 25, 0.8); border: 1px solid var(--accent-gold);">
            <i data-lucide="arrow-left" style="width: 18px; margin-right: 8px; vertical-align: middle;"></i> Volver
        </a>
    </div>

    <div class="showcase-container">
        <h1 class="brand-font" style="font-size: 3rem; color: var(--accent-gold); margin-bottom: 10px;">Flujos de Trabajo IA</h1>
        <p style="letter-spacing: 4px; color: var(--text-dim);">AUTOMATIZACIÓN SIN LÍMITES</p>

        <div class="full-image-wrapper">
            <img src="../assets/flujos_ia.png" alt="Flujos de Trabajo IA Showcase">
        </div>

        <div class="description-box">
            <h2 class="brand-font" style="color: var(--accent-orange); margin-bottom: 20px;">Eficiencia Absoluta</h2>
            <p style="font-size: 1.2rem; line-height: 1.8; color: var(--text-white);">
                Conectamos tus herramientas para que tu negocio trabaje por ti. 
                Sistemas autónomos que gestionan leads, ventas y procesos internos sin intervención humana.
            </p>
            <div class="price-tag" style="font-size: 3.5rem; margin: 30px 0;">$4,500 MXN</div>
            <a href="https://wa.me/524491091743?text=Hola%2C%20me%20interesan%20los%20*Flujos%20de%20Trabajo%20IA*" class="btn-primary" style="padding: 20px 60px; font-size: 1.2rem;">¡Automatizar mi Negocio!</a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
